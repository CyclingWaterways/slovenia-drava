<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DravaBike — Embed</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.27/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; font-family: 'Libre Franklin', system-ui, sans-serif; }
#viewDiv { position: fixed; inset: 0; }

/* Loading */
.loader { position: fixed; inset: 0; background: #F7F2EB; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s; }
.loader.gone { opacity: 0; pointer-events: none; }
.loader-ring { width: 32px; height: 32px; border: 2.5px solid #EBE3D8; border-top-color: #1B3A2D; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Hide default ArcGIS popup */
.esri-popup { display: none !important; }

/* Custom popup */
.custom-popup {
    position: fixed;
    z-index: 50;
    width: 320px;
    max-height: 420px;
    background: #FEFDFB;
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(15,38,27,0.2);
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    display: flex;
    flex-direction: column;
}
.custom-popup.on {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

.popup-close {
    position: absolute; top: 10px; right: 10px; z-index: 5;
    width: 28px; height: 28px;
    background: rgba(15,38,27,0.6); backdrop-filter: blur(4px);
    color: white; border: none; border-radius: 50%;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
}
.popup-close:hover { background: #1B3A2D; }

.popup-img {
    width: 100%; height: 180px;
    object-fit: cover; display: block;
    background: #EBE3D8;
}

.popup-body { padding: 16px; overflow-y: auto; flex: 1; }

.popup-badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    margin-bottom: 6px;
}
.type-1 { background: #E8F0E8; color: #2C5F41; }
.type-2 { background: #FDF3E7; color: #8B6914; }
.type-3 { background: #E6F0F6; color: #2A6496; }

.popup-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 18px; color: #1B3A2D;
    line-height: 1.25; margin-bottom: 8px;
}

.popup-desc {
    font-size: 13px; font-weight: 300;
    line-height: 1.65; color: #7A756E;
}

.popup-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid #EBE3D8;
}
.popup-counter { font-size: 10px; color: #7A756E; letter-spacing: 0.04em; }
.popup-arrows { display: flex; gap: 4px; }
.popup-arrow {
    width: 28px; height: 28px;
    border: 1px solid #EBE3D8; background: #FEFDFB;
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #2D2A26; transition: all 0.15s;
}
.popup-arrow:hover { background: #F7F2EB; border-color: #B5CDB6; }
.popup-arrow svg { width: 14px; height: 14px; }

.esri-ui-corner { margin: 10px; }
.esri-widget--button { border-radius: 6px !important; }
    </style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-ring"></div></div>
<div id="viewDiv"></div>

<div class="custom-popup" id="popup">
    <button class="popup-close" onclick="app.close()">×</button>
    <img class="popup-img" id="popImg" src="" alt="">
    <div class="popup-body">
        <span class="popup-badge" id="popBadge"></span>
        <div class="popup-title" id="popTitle"></div>
        <p class="popup-desc" id="popDesc"></p>
    </div>
    <div class="popup-nav">
        <span class="popup-counter" id="popCount"></span>
        <div class="popup-arrows">
            <button class="popup-arrow" onclick="app.prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
            <button class="popup-arrow" onclick="app.next()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
    </div>
</div>

<script>
const T = {
    en: { t1: "Interpretation Center", t2: "Interpretation Polygon", t3: "Interpretation Point" }
};

const app = {
    points: [], idx: -1, ptData: null,
    view: null, layer: null, tooltipLayer: null, highlight: null, Graphic: null,

    init() {
        fetch('https://cyclingwaterways.github.io/slovenia-drava/translations-dravabike.json')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(d => { this.ptData = d.points; })
            .catch(() => { this.ptData = {}; });
    },

    tr(fid, field) {
        if (!this.ptData || !this.ptData[fid]) return null;
        const e = this.ptData[fid]['en'];
        return e ? e[field] : null;
    },

    select(i) {
        if (i < 0 || i >= this.points.length) return;
        this.idx = i;
        const f = this.points[i];
        const a = f.attributes;
        const id = a.id || a.FID || a.fid;
        const type = a.Type || a.type || 1;
        const name = this.tr(id, 'name') || a.Point || a.point || 'Location';
        const desc = this.tr(id, 'description') || a.description || '';
        const photo = a.photo_url || a.Photo_url || '';
        const tName = ({ 1: T.en.t1, 2: T.en.t2, 3: T.en.t3 })[type] || '';
        const noImg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'%3E%3Crect fill='%23EBE3D8' width='320' height='180'/%3E%3Ctext fill='%237A756E' x='50%25' y='50%25' text-anchor='middle' dy='.3em' font-size='12'%3ENo image%3C/text%3E%3C/svg%3E";

        document.getElementById('popImg').src = photo || noImg;
        document.getElementById('popImg').alt = name;
        const badge = document.getElementById('popBadge');
        badge.className = 'popup-badge type-' + type;
        badge.textContent = tName;
        document.getElementById('popTitle').textContent = name;
        document.getElementById('popDesc').textContent = desc;
        document.getElementById('popCount').textContent = (i + 1) + ' / ' + this.points.length;

        // Highlight
        if (this.highlight) this.highlight.remove();
        if (this.view && this.layer) {
            this.view.whenLayerView(this.layer).then(lv => {
                this.highlight = lv.highlight(f);
            });
        }

        // Tooltip
        if (this.tooltipLayer && this.Graphic) {
            this.tooltipLayer.removeAll();
            this.tooltipLayer.add(new this.Graphic({
                geometry: f.geometry,
                symbol: { type: 'text', color: '#0F261B', text: name,
                    font: { size: 11, weight: 'bold', family: 'Libre Franklin, sans-serif' },
                    haloColor: 'white', haloSize: 2, yoffset: -25 }
            }));
        }

        // Fly to point, then position popup
        if (this.view) {
            this.view.goTo({ target: f.geometry, zoom: 12 }, { duration: 600 }).then(() => {
                this.positionPopup(f);
            });
        }
    },

    positionPopup(feature) {
        const popup = document.getElementById('popup');
        const sp = this.view.toScreen(feature.geometry);
        const vw = this.view.width;
        const vh = this.view.height;

        // Position popup to the right of the point, or left if not enough space
        let left = sp.x + 20;
        let top = sp.y - 100;
        if (left + 330 > vw) left = sp.x - 340;
        if (top < 10) top = 10;
        if (top + 420 > vh) top = vh - 430;

        popup.style.left = left + 'px';
        popup.style.top = top + 'px';
        popup.classList.add('on');
    },

    close() {
        document.getElementById('popup').classList.remove('on');
        if (this.tooltipLayer) this.tooltipLayer.removeAll();
        if (this.highlight) { this.highlight.remove(); this.highlight = null; }
        this.idx = -1;
    },

    prev() {
        if (!this.points.length) return;
        this.select(this.idx <= 0 ? this.points.length - 1 : this.idx - 1);
    },
    next() {
        if (!this.points.length) return;
        this.select(this.idx >= this.points.length - 1 ? 0 : this.idx + 1);
    }
};

require([
    "esri/WebMap", "esri/views/MapView", "esri/widgets/ScaleBar",
    "esri/Graphic", "esri/layers/GraphicsLayer"
], function(WebMap, MapView, ScaleBar, Graphic, GraphicsLayer) {
    app.Graphic = Graphic;
    const webmap = new WebMap({ portalItem: { id: "9fbc757c6ceb4ea4b39b96ffc47b4ea9" } });
    const view = new MapView({ container: "viewDiv", map: webmap, constraints: { minZoom: 9, maxZoom: 17 } });
    app.view = view;

    view.when(() => {
        document.getElementById('loader').classList.add('gone');
        setTimeout(() => document.getElementById('loader').style.display = 'none', 700);

        app.tooltipLayer = new GraphicsLayer();
        webmap.add(app.tooltipLayer);
        webmap.layers.forEach(l => { if (l.title && l.title.toLowerCase().includes('interpretation')) app.layer = l; });

        if (app.layer) {
            // Disable default popup on this layer
            app.layer.popupEnabled = false;
            const q = app.layer.createQuery();
            q.where = '1=1'; q.outFields = ['*']; q.orderByFields = ['id ASC'];
            app.layer.queryFeatures(q).then(r => {
                app.points = r.features;
                if (app.points.length) app.select(0);
            });
        }

        view.ui.move("zoom", "top-right");
        view.ui.add(new ScaleBar({ view, unit: 'metric' }), 'bottom-left');
    });

    view.on('click', e => {
        view.hitTest(e).then(r => {
            if (!r.results.length) { app.close(); return; }
            const g = r.results[0].graphic;
            if (g.layer !== app.layer) { app.close(); return; }
            const fid = g.attributes.FID || g.attributes.fid || g.attributes.OBJECTID;
            const idx = app.points.findIndex(f => (f.attributes.FID || f.attributes.fid || f.attributes.OBJECTID) === fid);
            if (idx !== -1) app.select(idx);
        });
    });

    view.on('pointer-move', e => {
        view.hitTest(e).then(r => {
            view.container.style.cursor = r.results.length && r.results[0].graphic.layer === app.layer ? 'pointer' : '';
        });
    });
});

app.init();
</script>
</body>
</html>
