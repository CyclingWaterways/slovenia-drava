<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DravaBike - Cycling Through Nature</title>
    
    <!-- ArcGIS Maps SDK -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================
           CSS VARIABLES & RESET
           ======================================== */
        :root {
            --color-forest: #1B3A2D;
            --color-forest-light: #2C5F41;
            --color-sage: #7A9E7E;
            --color-sage-light: #B5CDB6;
            --color-sand: #F4EDE4;
            --color-sand-dark: #E8DFD3;
            --color-earth: #8B7355;
            --color-earth-light: #C4A882;
            --color-water: #4A7F9E;
            --color-water-light: #A8D0E6;
            --color-text: #2D2A26;
            --color-text-secondary: #6B6560;
            --color-white: #FEFDFB;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'Source Sans 3', -apple-system, sans-serif;
            --header-height: 64px;
            --sidebar-width: 280px;
            --panel-width: 420px;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(27,58,45,0.08);
            --shadow-md: 0 4px 16px rgba(27,58,45,0.12);
            --shadow-lg: 0 8px 32px rgba(27,58,45,0.16);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--color-sand);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
        }

        /* ========================================
           HEADER
           ======================================== */
        #header {
            height: var(--header-height);
            background: var(--color-forest);
            color: var(--color-white);
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: relative;
            z-index: 1000;
            flex-shrink: 0;
        }

        /* Subtle texture overlay on header */
        #header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #headerProgram {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 1px;
        }

        #headerTitle {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        #headerSubtitle {
            font-size: 12px;
            font-weight: 300;
            opacity: 0.7;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Language selector */
        .language-selector {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 6px;
            z-index: 1;
        }

        .lang-flag {
            width: 32px;
            height: 22px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            opacity: 0.5;
            transition: var(--transition-fast);
            object-fit: cover;
        }

        .lang-flag:hover { opacity: 0.8; transform: scale(1.05); }
        .lang-flag.active { border-color: var(--color-sage-light); opacity: 1; }

        /* ========================================
           MAIN LAYOUT
           ======================================== */
        #main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ========================================
           SIDEBAR (LEFT)
           ======================================== */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--color-white);
            border-right: 1px solid var(--color-sand-dark);
            display: flex;
            flex-direction: column;
            z-index: 900;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-sand-dark);
        }

        #pointsList {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--color-sand-dark) transparent;
        }

        #pointsList::-webkit-scrollbar { width: 5px; }
        #pointsList::-webkit-scrollbar-track { background: transparent; }
        #pointsList::-webkit-scrollbar-thumb { background: var(--color-sand-dark); border-radius: 3px; }

        .point-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: var(--transition-fast);
            position: relative;
        }

        .point-item:hover {
            background: var(--color-sand);
            border-left-color: var(--color-sage-light);
        }

        .point-item.active {
            background: var(--color-sand);
            border-left-color: var(--color-forest);
        }

        .point-number {
            display: block;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-sage);
            margin-bottom: 3px;
        }

        .point-item.active .point-number {
            color: var(--color-forest-light);
        }

        .point-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text);
            line-height: 1.4;
        }

        .point-item.active .point-name {
            color: var(--color-forest);
            font-weight: 600;
        }

        /* Navigation buttons */
        .nav-buttons {
            padding: 12px 16px;
            border-top: 1px solid var(--color-sand-dark);
            display: flex;
            gap: 8px;
            background: var(--color-white);
        }

        .nav-btn {
            flex: 1;
            padding: 10px 12px;
            background: var(--color-forest);
            color: var(--color-white);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-btn:hover { background: var(--color-forest-light); }
        .nav-btn:active { transform: scale(0.97); }

        .nav-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* ========================================
           MAP (CENTER)
           ======================================== */
        #viewDiv {
            flex: 1;
            position: relative;
        }

        /* Loading overlay */
        #loading {
            position: absolute;
            inset: 0;
            background: var(--color-sand);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10000;
            transition: opacity 0.6s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-sand-dark);
            border-top-color: var(--color-forest);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        #loadingText {
            font-size: 13px;
            font-weight: 400;
            color: var(--color-text-secondary);
            letter-spacing: 0.02em;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========================================
           SIDE PANEL (RIGHT) — DETAIL VIEW
           ======================================== */
        .side-panel {
            width: var(--panel-width);
            background: var(--color-white);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            z-index: 950;
            transform: translateX(100%);
            transition: transform var(--transition-smooth);
            flex-shrink: 0;
            overflow: hidden;
        }

        .side-panel.visible {
            transform: translateX(0);
        }

        /* Close button */
        .panel-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(27,58,45,0.7);
            backdrop-filter: blur(8px);
            color: var(--color-white);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            z-index: 5;
        }

        .panel-close:hover { background: var(--color-forest); transform: scale(1.08); }

        /* Gallery / Image area */
        .panel-gallery {
            position: relative;
            height: 280px;
            background: var(--color-sand-dark);
            overflow: hidden;
            flex-shrink: 0;
        }

        .gallery-track {
            display: flex;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-slide {
            min-width: 100%;
            height: 100%;
        }

        .gallery-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 3;
        }

        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: none;
            cursor: pointer;
            transition: var(--transition-fast);
            padding: 0;
        }

        .gallery-dot.active {
            background: var(--color-white);
            transform: scale(1.3);
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(27,58,45,0.5);
            backdrop-filter: blur(4px);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            z-index: 3;
        }

        .gallery-nav:hover { background: rgba(27,58,45,0.8); }
        .gallery-nav.prev { left: 12px; }
        .gallery-nav.next { right: 12px; }

        /* Single image — hide nav */
        .panel-gallery.single .gallery-nav,
        .panel-gallery.single .gallery-dots { display: none; }

        /* Panel content */
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scrollbar-width: thin;
            scrollbar-color: var(--color-sand-dark) transparent;
        }

        .panel-body::-webkit-scrollbar { width: 5px; }
        .panel-body::-webkit-scrollbar-track { background: transparent; }
        .panel-body::-webkit-scrollbar-thumb { background: var(--color-sand-dark); border-radius: 3px; }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .type-1 { background: #E8F5E9; color: #2E7D32; }
        .type-2 { background: #FFF8E1; color: #F57F17; }
        .type-3 { background: #E3F2FD; color: #1565C0; }

        #locationName {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 400;
            color: var(--color-forest);
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .panel-divider {
            width: 40px;
            height: 2px;
            background: var(--color-sage-light);
            margin-bottom: 16px;
            border-radius: 1px;
        }

        #locationDescription {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.8;
            color: var(--color-text-secondary);
        }

        /* Point counter in panel */
        .panel-counter {
            padding: 16px 24px;
            border-top: 1px solid var(--color-sand-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--color-white);
            flex-shrink: 0;
        }

        .counter-text {
            font-size: 11px;
            font-weight: 500;
            color: var(--color-text-secondary);
            letter-spacing: 0.04em;
        }

        .panel-nav-btns {
            display: flex;
            gap: 6px;
        }

        .panel-nav-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--color-sand-dark);
            background: var(--color-white);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            color: var(--color-text);
        }

        .panel-nav-btn:hover {
            background: var(--color-sand);
            border-color: var(--color-sage-light);
        }

        .panel-nav-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ========================================
           MOBILE MENU TOGGLE
           ======================================== */
        #menuToggle {
            display: none;
            position: fixed;
            z-index: 1001;
            background: var(--color-white);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            font-size: 20px;
            align-items: center;
            justify-content: center;
            color: var(--color-forest);
            transition: var(--transition-fast);
        }

        #menuToggle:active { transform: scale(0.93); }

        /* ========================================
           RESPONSIVE — TABLET (≤1024px)
           ======================================== */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 240px;
                --panel-width: 360px;
            }

            #sidebar {
                position: fixed;
                left: calc(-1 * var(--sidebar-width));
                top: var(--header-height);
                bottom: 0;
                transition: left var(--transition-smooth);
                box-shadow: var(--shadow-lg);
                z-index: 960;
            }

            #sidebar.open { left: 0; }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                top: var(--header-height);
                background: rgba(0,0,0,0.3);
                z-index: 955;
            }

            .sidebar-overlay.visible { display: block; }

            #menuToggle {
                display: flex;
                top: calc(var(--header-height) + 12px);
                left: 12px;
            }
        }

        /* ========================================
           RESPONSIVE — MOBILE (≤768px)
           ======================================== */
        @media (max-width: 768px) {
            :root {
                --header-height: 56px;
                --panel-width: 100%;
            }

            #headerTitle { font-size: 18px; }
            #headerSubtitle { font-size: 10px; }
            #headerProgram { font-size: 8px; }

            .language-selector { right: 14px; gap: 5px; }
            .lang-flag { width: 26px; height: 18px; }

            #menuToggle {
                top: calc(var(--header-height) + 10px);
                left: 10px;
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            /* Side panel slides from RIGHT on mobile */
            .side-panel {
                position: fixed;
                right: 0;
                top: var(--header-height);
                bottom: 0;
                width: 300px;
                max-width: 80vw;
                transform: translateX(100%);
                border-radius: 0;
                box-shadow: -4px 0 24px rgba(0,0,0,0.15);
                z-index: 970;
            }

            .side-panel.visible {
                transform: translateX(0);
            }

            /* Hide drag handle on mobile — not a bottom sheet anymore */
            .sheet-handle { display: none; }

            .panel-gallery { height: 180px; }

            .panel-body { padding: 16px; }

            #locationName { font-size: 20px; margin-bottom: 12px; }
            #locationDescription { font-size: 13px; line-height: 1.7; }

            .panel-close { top: 12px; right: 12px; width: 32px; height: 32px; font-size: 16px; }

            .panel-counter { padding: 12px 16px; }

            /* Bottom nav bar for prev/next — always visible on mobile */
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--color-white);
                border-top: 1px solid var(--color-sand-dark);
                padding: 8px 16px calc(8px + env(safe-area-inset-bottom, 0px));
                z-index: 990;
                gap: 8px;
            }

            .mobile-nav .nav-btn { flex: 1; }

            /* Sidebar as overlay */
            #sidebar {
                position: fixed;
                left: calc(-1 * var(--sidebar-width));
                top: var(--header-height);
                bottom: 0;
                width: var(--sidebar-width);
                z-index: 980;
            }

            /* Hide desktop bottom nav buttons in sidebar on mobile */
            #sidebar .nav-buttons { display: none; }
        }

        /* Desktop: hide mobile-only elements */
        @media (min-width: 769px) {
            .mobile-nav { display: none; }
            .sheet-handle { display: none; }
        }

        @media (min-width: 1025px) {
            .sidebar-overlay { display: none !important; }
        }

        /* ========================================
           ANIMATIONS
           ======================================== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-body .type-badge,
        .panel-body #locationName,
        .panel-body .panel-divider,
        .panel-body #locationDescription {
            animation: fadeInUp 0.5s ease both;
        }

        .panel-body #locationName { animation-delay: 0.05s; }
        .panel-body .panel-divider { animation-delay: 0.1s; }
        .panel-body #locationDescription { animation-delay: 0.15s; }

        /* ========================================
           ARCGIS WIDGET OVERRIDES
           ======================================== */
        .esri-ui-corner { margin: 12px; }
        .esri-widget--button { border-radius: var(--radius-sm) !important; }
        .esri-expand__mask { background: rgba(0,0,0,0.25); }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-content">

    <script>
    // ==========================================
    // TRANSLATIONS
    // ==========================================
    const translations = {
        en: {
            headerProgram: "Interreg Europe · Cycling Waterways",
            headerTitle: "DravaBike — Cycling Through Nature",
            headerSubtitle: "Outdoor classroom along the Drava River",
            learningPoints: "Learning Points",
            prev: "Prev",
            next: "Next",
            loading: "Loading map...",
            typeCenter: "Interpretation Center",
            typePolygon: "Interpretation Polygon",
            typePoint: "Interpretation Point",
            pointLabel: "Point"
        },
        sl: {
            headerProgram: "Interreg Europe · Cycling Waterways",
            headerTitle: "DravaBike — Kolesarjenje skozi naravo",
            headerSubtitle: "Učilnica na prostem ob reki Dravi",
            learningPoints: "Učne točke",
            prev: "Prejšnja",
            next: "Naslednja",
            loading: "Nalaganje zemljevida...",
            typeCenter: "Interpretacijski center",
            typePolygon: "Interpretacijski poligon",
            typePoint: "Interpretacijska točka",
            pointLabel: "Točka"
        }
    };

    // ==========================================
    // STATE
    // ==========================================
    let currentLanguage = localStorage.getItem('dravabike_language') || 'en';
    let pointTranslations = null;
    let allPoints = [];
    let currentPointIndex = -1;
    let currentGalleryIndex = 0;
    let currentGalleryPhotos = [];

    // ==========================================
    // TRANSLATION LOADER
    // ==========================================
    fetch('https://cyclingwaterways.github.io/slovenia-drava/translations-dravabike.json')
        .then(r => {
            if (!r.ok) throw new Error('Failed to load translations');
            return r.json();
        })
        .then(data => {
            pointTranslations = data.points;
            console.log('Translations loaded:', Object.keys(pointTranslations).length, 'points');
            // Re-apply if points already loaded
            if (allPoints.length > 0) refreshSidebar();
        })
        .catch(err => {
            console.error('Error loading translations:', err);
            pointTranslations = {};
        });

    function getTranslatedPoint(fid, field) {
        if (!pointTranslations || !pointTranslations[fid]) return null;
        const t = pointTranslations[fid][currentLanguage];
        return t ? t[field] : null;
    }

    /**
     * Get gallery photos for a point.
     * Looks in the JSON translations for a "photos" array.
     * Falls back to the single photo_url from ArcGIS layer.
     */
    function getPointPhotos(fid, fallbackUrl) {
        if (pointTranslations && pointTranslations[fid]) {
            const pt = pointTranslations[fid];
            // Photos can be language-independent or per-language
            if (pt.photos && pt.photos.length > 0) return pt.photos;
            if (pt[currentLanguage] && pt[currentLanguage].photos && pt[currentLanguage].photos.length > 0) {
                return pt[currentLanguage].photos;
            }
        }
        return fallbackUrl ? [fallbackUrl] : [];
    }

    // ==========================================
    // LANGUAGE SWITCHING
    // ==========================================
    function setLanguage(lang) {
        currentLanguage = lang;
        localStorage.setItem('dravabike_language', lang);

        // Update flags
        document.querySelectorAll('.lang-flag').forEach(f => {
            f.classList.toggle('active', f.dataset.lang === lang);
        });

        // Update static UI
        const t = translations[lang];
        document.getElementById('headerTitle').textContent = t.headerTitle;
        document.getElementById('headerProgram').textContent = t.headerProgram;
        document.getElementById('headerSubtitle').textContent = t.headerSubtitle;
        document.getElementById('sidebarHeader').textContent = t.learningPoints;
        document.getElementById('prevLabel').textContent = t.prev;
        document.getElementById('nextLabel').textContent = t.next;
        document.getElementById('mobilePrevLabel').textContent = t.prev;
        document.getElementById('mobileNextLabel').textContent = t.next;
        document.getElementById('loadingText').textContent = t.loading;

        // Refresh dynamic content
        if (allPoints.length > 0) {
            refreshSidebar();
            if (currentPointIndex >= 0) {
                showSidePanel(allPoints[currentPointIndex].attributes);
                showPointTooltip(allPoints[currentPointIndex], allPoints[currentPointIndex].attributes);
            }
        }
    }

    // ==========================================
    // SIDEBAR
    // ==========================================
    function refreshSidebar() {
        const list = document.getElementById('pointsList');
        const t = translations[currentLanguage];
        list.innerHTML = '';

        allPoints.forEach((feature, index) => {
            const attrs = feature.attributes;
            const pointId = attrs.id || attrs.FID || attrs.fid;
            const pointName = attrs.Point || attrs.point || `${t.pointLabel} ${pointId}`;
            const translatedName = getTranslatedPoint(pointId, 'name') || pointName;

            const div = document.createElement('div');
            div.className = 'point-item' + (index === currentPointIndex ? ' active' : '');
            div.dataset.index = index;
            div.innerHTML = `
                <span class="point-number">${t.pointLabel} ${pointId}</span>
                <span class="point-name">${translatedName}</span>
            `;
            div.onclick = () => selectPoint(index);
            list.appendChild(div);
        });
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const isOpen = sidebar.classList.toggle('open');
        overlay.classList.toggle('visible', isOpen);
    }

    // ==========================================
    // GALLERY
    // ==========================================
    function initGallery(photos) {
        currentGalleryPhotos = photos;
        currentGalleryIndex = 0;

        const gallery = document.getElementById('panelGallery');
        const track = document.getElementById('galleryTrack');
        const dots = document.getElementById('galleryDots');

        gallery.className = 'panel-gallery' + (photos.length <= 1 ? ' single' : '');

        // Build slides
        track.innerHTML = photos.map(url =>
            `<div class="gallery-slide"><img src="${url}" alt="Photo" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 280%22%3E%3Crect fill=%22%23E8DFD3%22 width=%22400%22 height=%22280%22/%3E%3Ctext fill=%22%236B6560%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-family=%22sans-serif%22 font-size=%2214%22%3ENo image%3C/text%3E%3C/svg%3E'"></div>`
        ).join('');

        // Build dots
        dots.innerHTML = photos.length > 1
            ? photos.map((_, i) => `<button class="gallery-dot${i === 0 ? ' active' : ''}" onclick="galleryGoTo(${i})"></button>`).join('')
            : '';

        updateGalleryPosition();
    }

    function galleryGoTo(index) {
        currentGalleryIndex = index;
        updateGalleryPosition();
    }

    function galleryPrev() {
        currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryPhotos.length) % currentGalleryPhotos.length;
        updateGalleryPosition();
    }

    function galleryNext() {
        currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryPhotos.length;
        updateGalleryPosition();
    }

    function updateGalleryPosition() {
        const track = document.getElementById('galleryTrack');
        track.style.transform = `translateX(-${currentGalleryIndex * 100}%)`;

        document.querySelectorAll('.gallery-dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === currentGalleryIndex);
        });
    }

    // Touch swipe support for gallery
    (function setupGallerySwipe() {
        let startX = 0, startY = 0, isDragging = false;
        const gallery = document.getElementById('panelGallery');

        gallery.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isDragging = true;
        }, { passive: true });

        gallery.addEventListener('touchend', e => {
            if (!isDragging) return;
            isDragging = false;
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                dx < 0 ? galleryNext() : galleryPrev();
            }
        }, { passive: true });
    })();

    // ==========================================
    // POINT SELECTION & PANEL
    // ==========================================
    function selectPoint(index) {
        if (index < 0 || index >= allPoints.length) return;

        currentPointIndex = index;
        const feature = allPoints[index];
        const attrs = feature.attributes;

        // Update sidebar
        document.querySelectorAll('.point-item').forEach((item, i) => {
            item.classList.toggle('active', i === index);
            if (i === index) item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        // Close sidebar on mobile after selection
        if (window.innerWidth <= 1024) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        }

        showSidePanel(attrs);
        showPointTooltip(feature, attrs);

        // Zoom to point
        if (window.mapView) {
            window.mapView.goTo({ target: feature.geometry, zoom: 12 }, { duration: 800 });
        }

        // Highlight
        if (window.highlightHandle) window.highlightHandle.remove();
        if (window.mapView && window.interpretationLayer) {
            window.mapView.whenLayerView(window.interpretationLayer).then(lv => {
                window.highlightHandle = lv.highlight(feature);
            });
        }
    }

    function showSidePanel(attrs) {
        const panel = document.getElementById('sidePanel');
        const t = translations[currentLanguage];

        const pointId = attrs.id || attrs.FID || attrs.fid;
        const type = attrs.Type || attrs.type || 1;
        const typeNames = { 1: t.typeCenter, 2: t.typePolygon, 3: t.typePoint };

        // Badge
        const badge = document.getElementById('typeBadge');
        badge.className = 'type-badge type-' + type;
        badge.textContent = typeNames[type] || 'Learning Point';

        // Name
        const pointName = attrs.Point || attrs.point || 'Location';
        document.getElementById('locationName').textContent = getTranslatedPoint(pointId, 'name') || pointName;

        // Description
        const desc = attrs.description || 'No description available.';
        document.getElementById('locationDescription').textContent = getTranslatedPoint(pointId, 'description') || desc;

        // Gallery
        const photoUrl = attrs.photo_url || attrs.Photo_url || '';
        const photos = getPointPhotos(pointId, photoUrl);
        initGallery(photos.length > 0 ? photos : ['data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 280%22%3E%3Crect fill=%22%23E8DFD3%22 width=%22400%22 height=%22280%22/%3E%3Ctext fill=%22%236B6560%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-family=%22sans-serif%22 font-size=%2214%22%3ENo image%3C/text%3E%3C/svg%3E']);

        // Counter
        document.getElementById('counterText').textContent = `${currentPointIndex + 1} / ${allPoints.length}`;

        // Re-trigger animations
        const body = document.querySelector('.panel-body');
        body.style.animation = 'none';
        body.offsetHeight; // force reflow
        body.style.animation = '';

        // Show
        panel.classList.add('visible');
        panel.classList.remove('minimized');
        panel.style.transform = '';
    }

    function showPointTooltip(feature, attrs) {
        if (!window.tooltipLayer || !window.Graphic) return;
        window.tooltipLayer.removeAll();

        const pointId = attrs.id || attrs.FID || attrs.fid;
        const pointName = attrs.Point || attrs.point || 'Location';
        const translatedName = getTranslatedPoint(pointId, 'name') || pointName;

        const textGraphic = new window.Graphic({
            geometry: feature.geometry,
            symbol: {
                type: 'text',
                color: '#1B3A2D',
                text: translatedName,
                font: { size: 11, weight: 'bold', family: 'Source Sans 3, sans-serif' },
                haloColor: 'white',
                haloSize: 2,
                yoffset: -25
            }
        });
        window.tooltipLayer.add(textGraphic);
    }

    function closePanel() {
        const panel = document.getElementById('sidePanel');
        panel.classList.remove('visible');
        panel.style.transform = '';

        if (window.tooltipLayer) window.tooltipLayer.removeAll();
        if (window.highlightHandle) {
            window.highlightHandle.remove();
            window.highlightHandle = null;
        }

        document.querySelectorAll('.point-item').forEach(item => item.classList.remove('active'));
        currentPointIndex = -1;

        // Zoom out
        if (window.interpretationLayer && window.mapView) {
            const q = window.interpretationLayer.createQuery();
            q.where = '1=1';
            window.interpretationLayer.queryExtent(q).then(result => {
                if (result.extent) window.mapView.goTo(result.extent.expand(1.1), { duration: 600 });
            });
        }
    }

    function navigatePrevious() {
        if (allPoints.length === 0) return;
        const idx = currentPointIndex <= 0 ? allPoints.length - 1 : currentPointIndex - 1;
        selectPoint(idx);
    }

    function navigateNext() {
        if (allPoints.length === 0) return;
        const idx = currentPointIndex >= allPoints.length - 1 ? 0 : currentPointIndex + 1;
        selectPoint(idx);
    }

    // ==========================================
    // INIT LANGUAGE ON LOAD
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => setLanguage(currentLanguage));

    // ==========================================
    // ARCGIS MAP INITIALIZATION
    // ==========================================
    require([
        "esri/WebMap",
        "esri/views/MapView",
        "esri/widgets/Legend",
        "esri/widgets/ScaleBar",
        "esri/widgets/Expand",
        "esri/Graphic",
        "esri/layers/GraphicsLayer"
    ], function(WebMap, MapView, Legend, ScaleBar, Expand, Graphic, GraphicsLayer) {

        // Store Graphic constructor globally for tooltip usage
        window.Graphic = Graphic;

        const webmap = new WebMap({
            portalItem: { id: "9fbc757c6ceb4ea4b39b96ffc47b4ea9" }
        });

        const view = new MapView({
            container: "viewDiv",
            map: webmap,
            constraints: { minZoom: 9, maxZoom: 17 }
        });

        window.mapView = view;
        window.highlightHandle = null;

        view.when(() => {
            // Fade out loading
            const loadingEl = document.getElementById('loading');
            loadingEl.classList.add('hidden');
            setTimeout(() => loadingEl.style.display = 'none', 600);

            // Tooltip layer
            const tooltipLayer = new GraphicsLayer();
            webmap.add(tooltipLayer);
            window.tooltipLayer = tooltipLayer;

            // Find interpretation layer
            let interpretationLayer = null;
            webmap.layers.forEach(layer => {
                if (layer.title && layer.title.toLowerCase().includes('interpretation')) {
                    interpretationLayer = layer;
                }
            });
            window.interpretationLayer = interpretationLayer;

            if (interpretationLayer) loadPoints(interpretationLayer);

            // Legend (desktop only)
            if (window.innerWidth > 768) {
                const legend = new Legend({ view, style: 'card' });
                const legendExpand = new Expand({
                    view, content: legend, expanded: false,
                    expandIconClass: 'esri-icon-layer-list',
                    expandTooltip: 'Legend'
                });
                view.ui.add(legendExpand, 'top-right');
            }

            // Scale bar
            view.ui.add(new ScaleBar({ view, unit: 'metric' }), 'bottom-left');
        });

        // Click handler
        view.on('click', event => {
            view.hitTest(event).then(response => {
                if (response.results.length === 0) return;
                const graphic = response.results[0].graphic;
                if (graphic.layer !== window.interpretationLayer) return;

                const clickedFid = graphic.attributes.FID || graphic.attributes.fid || graphic.attributes.OBJECTID;
                const idx = allPoints.findIndex(f => {
                    const fid = f.attributes.FID || f.attributes.fid || f.attributes.OBJECTID;
                    return fid === clickedFid;
                });
                if (idx !== -1) selectPoint(idx);
            });
        });

        // Hover cursor
        view.on('pointer-move', event => {
            view.hitTest(event).then(response => {
                const hit = response.results.length > 0 && response.results[0].graphic.layer === window.interpretationLayer;
                view.container.style.cursor = hit ? 'pointer' : 'default';
            });
        });

        function loadPoints(layer) {
            const query = layer.createQuery();
            query.where = '1=1';
            query.outFields = ['*'];
            query.orderByFields = ['id ASC'];

            layer.queryFeatures(query).then(result => {
                allPoints = result.features;
                refreshSidebar();
                if (allPoints.length > 0) selectPoint(0);
            });
        }
    });
    </script>
</body>
</html>
